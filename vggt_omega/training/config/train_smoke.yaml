# Smoke-test training config: single TUM vendor, 50 steps, single GPU.
#
#   .venv/bin/python train.py --config vggt_omega/training/config/train_smoke.yaml
#
# Same structure as train_default.yaml; validation is off (val_interval larger
# than max_steps) so the run never touches the eval yamls.

run:
  output_dir: outputs/train_smoke   # train.py overrides with --out_root/--run_name
  max_steps: 50
  log_interval: 1
  img_log_interval: 10
  val_interval: 10000               # > max_steps: validation off for the smoke run
  ckpt_interval: 25
  keep_last: 3
  seed: 42

optim:
  lr: 2.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.95]
  warmup_frac: 0.05
  grad_clip: 1.0

loss:
  weights: {camera: 5.0, depth: 1.0, point: 0.5, match: 0.1}
  alpha: 0.2
  temperature: 1.0

model:
  embed_dim: 1024
  patch_size: 16
  checkpoint: /jfs/jing.feng/checkpoints/VGGT-Omega/vggt_omega_1b_512.pt
  gradient_checkpointing: true

val:
  configures:
    - vggt_omega/datasets/config/tum.yaml
  num_frames: 10
  max_sequences: 2

data:
  train:
    _target_: vggt_omega.datasets.dynamic_dataloader.DynamicTorchDataset
    num_workers: 8
    max_img_per_gpu: 12
    shuffle: false          # use inside_random to avoid large-dict shuffle OOM
    pin_memory: false
    common_config:
      img_size: 512
      patch_size: 16
      fix_img_num: -1
      fix_aspect_ratio: 1.0
      load_track: true
      track_num: 512
      track_neg_ratio: 0.5
      training: true
      inside_random: true
      rescale: true
      rescale_aug: true
      landscape_check: false
      debug: false
      get_nearby: true
      load_depth: true
      img_nums: [2, 12]
      max_img_per_gpu: 12
      allow_duplicate_img: true
      repeat_batch: false
      augs:
        cojitter: true
        cojitter_ratio: 0.3
        scales: [0.8, 1.2]
        aspects: [0.33, 1.0]
        color_jitter: {brightness: 0.5, contrast: 0.5, saturation: 0.5, hue: 0.1, p: 0.9}
        gray_scale: true
        gau_blur: false
    dataset:
      _target_: vggt_omega.datasets.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: vggt_omega.datasets.vendors.tum.TumDataset
          split: train
          # Machine-specific path — override for your environment.
          TUM_DIR: /jfs/guibiao/streamVGGT/data/eval/tum
          sequences: ["*"]
          len_train: 100000
          expand_ratio: 8
          assoc_max_diff: 0.02
          depth_scale: 5000.0
          intrinsics: null
          min_num_images: 24
